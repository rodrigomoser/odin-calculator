<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="mainContainer">
        <div class="calculatorVisor">
            0
        </div>
        <div class="calculatorBody">

            <div class="calculatorRow">
                <button class="specialButtons">
                    AC
                </button>
                <button class="specialButtons">
                    C
                </button>
            </div>


            <div class="calculatorRow">
                <button class="squareButton">
                    7
                </button>
                <button class="squareButton">
                    8
                </button>
                <button class="squareButton">
                    9
                </button>
                <button class="squareButton">
                    ÷
                </button>
            </div>

            <div class="calculatorRow">
                <button class="squareButton">
                    4
                </button>
                <button class="squareButton">
                    5
                </button>
                <button class="squareButton">
                    6
                </button>
                <button class="squareButton">
                    x
                </button>

            </div>

            <div class="calculatorRow">
                <button class="squareButton">
                    1
                </button>
                <button class="squareButton">
                    2
                </button>
                <button class="squareButton">
                    3
                </button>
                <button class="squareButton">
                    -
                </button>
            </div>

            <div class="calculatorRow">
                <button class="squareButton">
                    .
                </button>
                <button class="squareButton">
                    0
                </button>
                <button class="squareButton">
                    =
                </button>
                <button class="squareButton">
                    +
                </button>
            </div>

        </div>

    </div>
</body>
</html>
